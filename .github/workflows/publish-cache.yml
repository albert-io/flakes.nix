name: Publish Cache

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-cache:
    name: Build and publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v17
        with:
          name: albert-flakes
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Show flake outputs
        run: nix flake show --allow-import-from-derivation

      - name: Check flake
        run: nix flake check --allow-import-from-derivation

      - name: Build depot
        run: nix build .#depot --print-build-logs

      - name: Build dexter
        run: nix build .#dexter --print-build-logs

      - name: Build honeybadger-cli
        run: nix build .#honeybadger-cli --print-build-logs

      - name: Build playwright-cli
        run: nix build .#playwright-cli --print-build-logs
