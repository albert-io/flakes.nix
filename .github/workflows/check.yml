name: Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Lint GitHub Actions workflows
        run: nix run nixpkgs#actionlint

      - name: Show flake outputs
        run: nix flake show --allow-import-from-derivation

      - name: Check flake
        run: nix flake check --allow-import-from-derivation

      - name: Build depot
        run: nix build .#depot --print-build-logs

      - name: Build dexter
        run: nix build .#dexter --print-build-logs

      - name: Build honeybadger-cli
        run: nix build .#honeybadger-cli --print-build-logs

      - name: Build playwright-cli
        run: nix build .#playwright-cli --print-build-logs

      - name: Build tidewave-cli
        run: nix build .#tidewave-cli --print-build-logs
